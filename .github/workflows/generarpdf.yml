name: Generar PDF Reporte Palladium

on:
  workflow_dispatch:          # se ejecuta manualmente desde GitHub
    inputs:
      html_filename:
        description: 'Nombre del archivo HTML (sin extensión)'
        required: true
        default: 'reporte_palladium_mayo_2026'

jobs:
  generar-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar dependencias de Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64

      - name: Generar PDF
        run: |
          HTML_INPUT="${{ github.event.inputs.html_filename }}.html" \
          PDF_OUTPUT="${{ github.event.inputs.html_filename }}.pdf" \
          node generar_pdf.js

      - name: Subir PDF como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pdf
          path: output/*.pdf
          retention-days: 30
